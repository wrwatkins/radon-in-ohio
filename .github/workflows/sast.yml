name: SAST

on:
  push:
    branches: ["main", "feature/**", "fix/**", "feat/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: |
          bandit -r . \
            --exclude ./venv,./.venv,./node_modules,./.ai-instructions,./staticfiles,./test-results \
            --severity-level medium \
            --confidence-level medium \
            -f json -o bandit-report.json || true
          bandit -r . \
            --exclude ./venv,./.venv,./node_modules,./.ai-instructions,./staticfiles,./test-results \
            --severity-level medium \
            --confidence-level medium

      - name: Upload SAST report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
