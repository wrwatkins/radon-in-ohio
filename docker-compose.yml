services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: radon_dev
      POSTGRES_USER: radon
      POSTGRES_PASSWORD: radon_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radon -d radon_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8010:8000"
    environment:
      DJANGO_SETTINGS_MODULE: radoninohio.settings.dev
      DATABASE_URL: postgis://radon:radon_pass@db:5432/radon_dev
      SECRET_KEY: dev-only-secret-key-not-for-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
